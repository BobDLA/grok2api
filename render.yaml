services:
  - type: web
    name: grok2api
    env: docker
    plan: free
    autoDeploy: false
    healthCheckPath: /health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE_ENABLED
        value: "false"
      - key: APP_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: SERVER_STORAGE_TYPE
        value: pgsql
      - key: SERVER_STORAGE_URL
        sync: false
      - key: SERVER_HOST
        value: 0.0.0.0
      - key: SERVER_PORT
        value: "8000"
